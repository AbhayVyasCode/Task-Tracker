<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square in gold gradient -->
  <rect width="32" height="32" rx="8" fill="#d9941e"/>
  <rect width="32" height="32" rx="8" fill="url(#goldGrad)"/>
  <!-- Checkmark square outline -->
  <rect x="7" y="7" width="18" height="18" rx="3" fill="none" stroke="#09090b" stroke-width="2.2"/>
  <!-- Checkmark tick -->
  <polyline points="11,16 14.5,19.5 21,12.5" fill="none" stroke="#09090b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5a93b"/>
      <stop offset="100%" stop-color="#b87b14"/>
    </linearGradient>
  </defs>
</svg>